openapi: 3.0.3

info:
  title: 'Museum of Lobby Art: Catalog Service'
  description: Manage artwork submissions for the Museum of Lobby Art
  version: 0.1.0

paths:
  /media_upload_url:
    options:
      parameters:
        - name: 'Origin'
          in: 'header'
          schema:
            type: 'string'
      responses:
        '200':
          description: Success
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: 'string'
            Access-Control-Allow-Methods:
              schema:
                type: 'string'
            Access-Control-Allow-Headers:
              schema:
                type: 'string'
          content: {}
      x-amazon-apigateway-auth:
        type: NONE
      x-amazon-apigateway-integration:
        type: mock
        httpMethod: 'GET'
        connectionType: 'INTERNET'
        contentHandling: 'CONVERT_TO_TEXT'
        passthroughBehavior: when_no_templates
        timeoutInMillis: 4000
        requestTemplates:
          application/json: |
            { "statusCode": 200 }
            #set($context.requestOverride.header.Access-Control-Allow-Origin = $input.params('Origin'))
        requestParameters:
          'integration.request.header.Origin': 'method.request.header.Origin'
        responses:
          '200':
            statusCode: '200'
            responseParameters:
              'method.response.header.Access-Control-Allow-Origin': 'context.requestOverride.header.Access-Control-Allow-Origin'
              'method.response.header.Access-Control-Allow-Methods': "'GET'"
              'method.response.header.Access-Control-Allow-Headers': "'Accept,Authorization,Content-Type,Origin,x-amz-date,x-apigateway-header'"
    get:
      responses:
        '200':
          description: Success
      x-amazon-apigateway-auth:
        type: NONE
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        responses:
          default:
            statusCode: '200'
        passthroughBehavior: when_no_match
        timeoutInMillis: 15000
        connectionType: INTERNET
        uri: ${get_upload_url_handler}
  /works:
    options:
      parameters:
        - name: 'Origin'
          in: 'header'
          schema:
            type: 'string'
      responses:
        '200':
          description: Success
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: 'string'
            Access-Control-Allow-Methods:
              schema:
                type: 'string'
            Access-Control-Allow-Headers:
              schema:
                type: 'string'
          content: {}
      x-amazon-apigateway-auth:
        type: NONE
      x-amazon-apigateway-integration:
        type: mock
        httpMethod: 'GET'
        connectionType: 'INTERNET'
        contentHandling: 'CONVERT_TO_TEXT'
        passthroughBehavior: when_no_templates
        timeoutInMillis: 4000
        requestTemplates:
          application/json: |
            { "statusCode": 200 }
            #set($context.requestOverride.header.Access-Control-Allow-Origin = $input.params('Origin'))
        requestParameters:
          'integration.request.header.Origin': 'method.request.header.Origin'
        responses:
          '200':
            statusCode: '200'
            responseParameters:
              'method.response.header.Access-Control-Allow-Origin': 'context.requestOverride.header.Access-Control-Allow-Origin'
              'method.response.header.Access-Control-Allow-Methods': "'GET,POST,OPTIONS'"
              'method.response.header.Access-Control-Allow-Headers': "'Accept,Authorization,Content-Type,Origin,x-amz-date,x-apigateway-header'"
    post:
      responses:
        '201':
          description: Created
        '401':
          description: Unauthorized
      x-amazon-apigateway-auth:
        type: NONE
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        responses:
          default:
            statusCode: '200'
        passthroughBehavior: when_no_match
        timeoutInMillis: 15000
        connectionType: INTERNET
        uri: ${post_work_handler}
    get:
      responses:
        '200':
          description: Created
        '401':
          description: Unauthorized
      x-amazon-apigateway-auth:
        type: NONE
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        responses:
          default:
            statusCode: '200'
        passthroughBehavior: when_no_match
        timeoutInMillis: 15000
        connectionType: INTERNET
        uri: ${list_works_handler}
  /works/{ID}:
    options:
      parameters:
        - name: 'Origin'
          in: 'header'
          schema:
            type: 'string'
      responses:
        '200':
          description: Success
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: 'string'
            Access-Control-Allow-Methods:
              schema:
                type: 'string'
            Access-Control-Allow-Headers:
              schema:
                type: 'string'
          content: {}
      x-amazon-apigateway-auth:
        type: NONE
      x-amazon-apigateway-integration:
        type: mock
        httpMethod: 'GET'
        connectionType: 'INTERNET'
        contentHandling: 'CONVERT_TO_TEXT'
        passthroughBehavior: when_no_templates
        timeoutInMillis: 4000
        requestTemplates:
          application/json: |
            { "statusCode": 200 }
            #set($context.requestOverride.header.Access-Control-Allow-Origin = $input.params('Origin'))
        requestParameters:
          'integration.request.header.Origin': 'method.request.header.Origin'
        responses:
          '200':
            statusCode: '200'
            responseParameters:
              'method.response.header.Access-Control-Allow-Origin': 'context.requestOverride.header.Access-Control-Allow-Origin'
              'method.response.header.Access-Control-Allow-Methods': "'GET,PATCH,OPTIONS'"
              'method.response.header.Access-Control-Allow-Headers': "'Accept,Authorization,Content-Type,Origin,x-amz-date,x-apigateway-header'"
    get:
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
      x-amazon-apigateway-auth:
        type: NONE
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        responses:
          default:
            statusCode: '200'
        passthroughBehavior: when_no_match
        timeoutInMillis: 15000
        connectionType: INTERNET
        uri: ${get_work_handler}
    patch:
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '400':
          description: Bad Request
        '404':
          description: Not Found
      x-amazon-apigateway-auth:
        type: NONE
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        responses:
          default:
            statusCode: '200'
        passthroughBehavior: when_no_match
        timeoutInMillis: 15000
        connectionType: INTERNET
        uri: ${patch_work_handler}
  /works.geojson:
